name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Socle léger : prouve que le sas s'installe et tient ses invariants sans
  # les dépendances NER, et que les tests NER se sautent proprement.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Installation
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
      - name: Lint
        run: uv run ruff check .
      - name: Tests (invariants inclus)
        run: uv run pytest

  # Couche NER : le rappel PERSONNE / ORGANISATION / LIEU et la non-fuite au
  # périmètre complet ne sont prouvés que si ces tests s'exécutent vraiment.
  tests-ner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Installation (torch CPU, extras NER et repli spaCy)
        run: |
          uv venv --python 3.12
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install -e ".[dev,ner,ner-repli-spacy]"
      - name: Cache du modèle NER épinglé
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: modele-ner-ef35fe7767c1dad71f5c853838cdd80d0b3441ed
      - name: Téléchargement du modèle épinglé (sans effet si en cache)
        run: uv run python -m sas_confiance_ia.telechargement
      - name: "Garde-fou : les tests NER ne doivent pas être sautés"
        run: |
          uv run python -c "from sas_confiance_ia.ner import modele_transformers_present; assert modele_transformers_present(), 'modèle NER absent du cache local'"
          uv run python -c "import importlib.util; assert importlib.util.find_spec('fr_core_news_lg'), 'repli spaCy absent'"
      - name: Tests (suite complète, NER inclus)
        run: uv run pytest -rs
