name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Installation
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
      - name: Lint
        run: uv run ruff check .
      - name: Tests (invariants inclus)
        run: uv run pytest
