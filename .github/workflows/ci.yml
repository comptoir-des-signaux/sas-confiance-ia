name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Installation
        run: uv pip install --system -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Tests (invariants inclus)
        run: pytest
