# Distribution de référence (ADR-013) : le sas seul par défaut, les services
# Ollama et OpenWebUI en option via leurs profils respectifs.
#
#   docker compose up --build                              # sas seul (backend externe)
#   docker compose --profile ollama up --build             # sas + Ollama local
#   docker compose --profile openwebui up --build          # sas + OpenWebUI
#   docker compose --profile ollama --profile openwebui up # sas + Ollama + OpenWebUI
#
# Topologie T2 (serveur) : même compose sans le profil ollama, avec
# SAS_BACKEND_BASE_URL pointé vers Infomaniak ou Scaleway (voir docs/).

services:
  sas:
    build: .
    # Boucle locale par défaut : exposer plus largement est un choix explicite.
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      # Le défaut vise le service du profil « ollama » ci-dessous : SANS ce
      # profil, définir SAS_BACKEND_BASE_URL, sinon chaque requête fera 502.
      SAS_BACKEND_BASE_URL: ${SAS_BACKEND_BASE_URL:-http://ollama:11434/v1}
      # Modèles annoncés par /v1/models : doivent exister côté backend
      # (ollama pull mistral-small:24b, par exemple).
      SAS_MODELES: ${SAS_MODELES:-mistral-small:24b}
      # Clé API du backend cloud : à injecter par secret ou variable de
      # session, JAMAIS écrite dans ce fichier ni committée.
      SAS_BACKEND_CLE_API: ${SAS_BACKEND_CLE_API:-}
      # transformers (défaut, embarqué dans l'image) ou inactif ; le repli
      # spacy n'est PAS embarqué dans l'image de référence.
      SAS_NER: ${SAS_NER:-}
      SAS_BACKEND_TIMEOUT_SECONDES: ${SAS_BACKEND_TIMEOUT_SECONDES:-}
      # Vault persistant chiffré (REQ-004/005) : pointer SAS_VAULT_CHEMIN
      # vers le volume ci-dessous (ex. /donnees/vault.sas) et fournir la clé
      # par secret. Sans ces deux variables : vault en mémoire, perdu à
      # l'arrêt du conteneur.
      SAS_VAULT_CHEMIN: ${SAS_VAULT_CHEMIN:-}
      SAS_VAULT_CLE: ${SAS_VAULT_CLE:-}
      # Juge LLM local C3 (REQ-014), optionnel : pointer un endpoint LOCAL
      # (le service ollama du profil, par exemple) et un modèle léger.
      # Absent = sas fonctionnel, documenté moins couvrant.
      SAS_JUGE_BASE_URL: ${SAS_JUGE_BASE_URL:-}
      SAS_JUGE_MODELE: ${SAS_JUGE_MODELE:-}
      SAS_JUGE_SCORE_MIN: ${SAS_JUGE_SCORE_MIN:-}
      # Politiques par type (Lot 14, cadrage 9.5) : « TYPE=action,... »,
      # actions pseudonymiser / masquer / conserver / revue. Une action ou
      # un type inconnu refuse le démarrage.
      SAS_POLITIQUES: ${SAS_POLITIQUES:-}
    volumes:
      - donnees:/donnees

  ollama:
    # Épingler une version précise en production plutôt que latest.
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    profiles: ["ollama"]
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  openwebui:
    # Interface de chat (type ChatGPT) branchée sur le sas. Produit tiers
    # (https://github.com/open-webui/open-webui), non inclus dans le code du
    # projet : ce service est un confort de déploiement. Le sas fonctionne
    # seul avec sa propre UI minimale sur http://127.0.0.1:8787/.
    # Épingler une version précise en production plutôt que main.
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    profiles: ["openwebui"]
    depends_on:
      - sas
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      # OpenWebUI croit parler à un backend OpenAI ; en réalité, il parle au
      # sas via le réseau Docker interne. Aucune clé requise par le sas.
      OPENAI_API_BASE_URL: "http://sas:8787/v1"
      OPENAI_API_KEY: "sas-no-key-required"
    volumes:
      - openwebui:/app/backend/data

volumes:
  donnees:
  ollama:
  openwebui:
